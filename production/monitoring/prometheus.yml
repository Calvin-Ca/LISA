global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/lisa-alert-rules.yml

scrape_configs:
  - job_name: lisa-safety-seg
    metrics_path: /metrics/prometheus
    authorization:
      type: Bearer
      credentials_file: /run/secrets/lisa_metrics_api_key
    static_configs:
      - targets:
          - lisa-api:8000

  # Deploy NVIDIA DCGM Exporter before uncommenting this scrape job.
